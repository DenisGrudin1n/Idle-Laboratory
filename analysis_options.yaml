include: package:very_good_analysis/analysis_options.5.1.0.yaml

analyzer:
  errors:
    comment_references: ignore
    curly_braces_in_flow_control_structures: ignore
    eol_at_end_of_file: ignore
    flutter_style_todos: ignore
    lines_longer_than_80_chars: ignore
    one_member_abstracts: ignore
    only_throw_errors: ignore
    unused_shown_name: ignore
    avoid_positional_boolean_parameters: error
    prefer_if_elements_to_conditional_expressions: ignore
  exclude:
    - lib/**.g.dart
    - lib/**.freezed.dart
    - test/**.mocks.dart
    - lib/**/generated/**.dart
linter:
  rules:
    public_member_api_docs: false
    prefer_relative_imports: false

formatter:
  page_width: 120
